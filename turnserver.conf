# coturn TURN server configuration for local network VoIP
# ─────────────────────────────────────────────────────────

# Listening on all interfaces
listening-port=3478

# Relay ports range
min-port=49152
max-port=65535

# Realm — use a descriptive name for your local network
realm=voicelink.local

# Long-term credential mechanism for TURN
lt-cred-mech

# Static user credentials (username:password)
user=voicelink:voicelink2026

# Log to stdout
log-file=stdout
verbose

# Fingerprinting for message integrity
fingerprint

# Disable CLI
no-cli

# Server name
server-name=voicelink-turn

# No TLS for local network (simplifies setup)
no-tls
no-dtls
